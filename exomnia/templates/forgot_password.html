<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0E4950">
    <link rel="icon" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-180.png">
    <title>NEOX — Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --brand:      #0E4950;
            --brand-dark: #092f34;
            --brand-mid:  #134f57;
            --accent:     #1fd8a4;
            --text-on-dark: #1a2e2f;
            --text-dim:     #6b8c8e;
            --field-bg:     #f4f8f8;
            --field-border: #d0e4e5;
            --field-focus:  rgba(31,216,164,0.35);
        }

        html, body { height: 100%; min-height: 100vh; min-height: 100dvh; }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
            background: #ffffff;
            color: var(--text-on-dark);
            -webkit-font-smoothing: antialiased;
        }

        .page {
            position: relative; z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 20px 32px;
            padding-top: calc(24px + env(safe-area-inset-top, 0px));
            padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
            max-width: 460px;
            width: 100%;
            margin: 0 auto;
        }

        .brand-section { text-align: center; padding-bottom: 24px; }

        .brand-name {
            font-size: 38px; font-weight: 800; color: var(--brand);
            letter-spacing: 7px; text-transform: uppercase; line-height: 1;
            position: relative; display: inline-block;
        }
        .brand-name::after {
            content: ''; display: block; width: 32px; height: 3px;
            background: var(--accent); border-radius: 2px; margin: 8px auto 0;
        }
        .brand-tagline {
            font-size: 11.5px; color: var(--text-dim); margin-top: 12px;
            letter-spacing: 1.4px; text-transform: uppercase; font-weight: 500;
        }

        .form-section { flex: 1; }
        .form-title { font-size: 22px; font-weight: 700; color: var(--brand); margin-bottom: 4px; }
        .form-subtitle { font-size: 13.5px; color: var(--text-dim); margin-bottom: 28px; line-height: 1.5; }

        .error-banner {
            display: none; align-items: flex-start; gap: 9px;
            background: rgba(225,29,72,0.08); border: 1px solid rgba(225,29,72,0.3);
            border-radius: 10px; padding: 12px 14px; margin-bottom: 20px;
            font-size: 13px; color: #c0152a; line-height: 1.45;
        }
        .error-banner.show { display: flex; }
        .error-banner i { margin-top: 1px; flex-shrink: 0; }

        .field { margin-bottom: 18px; }
        .field-label {
            display: flex; align-items: center; gap: 7px;
            font-size: 11.5px; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
        }
        .field-label i { font-size: 10px; }

        .input-wrap { position: relative; }
        .input-wrap .pfx {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: #9ab8ba; font-size: 13px; pointer-events: none; z-index: 2;
            transition: color 0.15s;
        }
        .input-wrap input, .input-wrap select {
            width: 100%; padding: 14px 14px 14px 42px;
            background: var(--field-bg); border: 1.5px solid var(--field-border);
            border-radius: 12px; font-size: 15px; font-family: inherit; font-weight: 500;
            color: #1a2e2f; -webkit-appearance: none; appearance: none; outline: none;
            transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
        }
        .input-wrap input::placeholder { color: #9ab8ba; font-weight: 400; }
        .input-wrap select {
            cursor: pointer;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239ab8ba' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 12px center; background-size: 13px;
        }
        .input-wrap select option { background: #ffffff; color: #1a2e2f; }
        .input-wrap input:focus, .input-wrap select:focus {
            border-color: var(--accent); background: #edfaf6; box-shadow: 0 0 0 3px var(--field-focus);
        }
        .input-wrap:focus-within .pfx { color: var(--accent); }

        .phone-row { display: flex; gap: 10px; }
        .phone-row .input-wrap:first-child { flex: 0 0 112px; }
        .phone-row .input-wrap:last-child  { flex: 1; }

        .btn-signin {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; margin-top: 8px; padding: 16px; border: none; border-radius: 12px;
            font-size: 15.5px; font-weight: 700; font-family: inherit; cursor: pointer;
            background: #0E4950; color: #ffffff; box-shadow: 0 4px 20px rgba(14,73,80,0.3);
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            position: relative; overflow: hidden;
        }
        .btn-signin::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 55%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.45s ease;
        }
        .btn-signin:hover::after { left: 150%; }
        .btn-signin:hover { background: #0a363a; box-shadow: 0 6px 24px rgba(14,73,80,0.4); transform: translateY(-1px); }
        .btn-signin:active  { transform: translateY(0); box-shadow: 0 2px 10px rgba(14,73,80,0.2); }
        .btn-signin:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-signin:disabled::after { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: #ffffff; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
        }

        .footer { text-align: center; margin-top: 22px; }
        .signup-line { font-size: 14px; color: var(--text-dim); }
        .signup-line a { color: var(--brand); font-weight: 700; text-decoration: none; }
        .signup-line a:hover { text-decoration: underline; }

        #overlay {
            display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.92); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 16px; color: var(--brand); font-size: 15px; font-weight: 500;
        }
        #overlay.show { display: flex; }
        .overlay-ring {
            width: 44px; height: 44px; border: 3px solid rgba(14,73,80,0.15);
            border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite;
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .brand-section  { animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both; }
        .form-section   { animation: fadeUp 0.4s 0.07s cubic-bezier(0.22,1,0.36,1) both; }
        .footer         { animation: fadeUp 0.4s 0.12s cubic-bezier(0.22,1,0.36,1) both; }

        @media (min-width: 860px) {
            html {
                background:
                    radial-gradient(circle at 15% 10%, rgba(46,196,182,0.25), transparent 45%),
                    radial-gradient(circle at 85% 90%, rgba(26,107,117,0.35), transparent 50%),
                    linear-gradient(135deg, #0a3238 0%, #0E4950 55%, #124f57 100%);
                min-height: 100vh; display: flex; align-items: center; justify-content: center;
            }
            body {
                max-width: 460px; width: 92vw; max-height: 820px; border-radius: 28px; overflow: auto;
                box-shadow: 0 40px 100px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06);
            }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="overlay-ring"></div>
        <span>Sending code…</span>
    </div>

    <div class="page">

        <div class="brand-section">
            <div class="brand-name">NEOX</div>
            <div class="brand-tagline">Connect · Communicate · Grow</div>
        </div>

        <div class="form-section">

            <div class="form-title">Forgot password?</div>
            <div class="form-subtitle">Enter the email on your account. If we find a match, we'll send a reset code there.</div>

            <div class="error-banner" id="errorMsg">
                <i class="fas fa-circle-exclamation"></i>
                <span id="errorText"></span>
            </div>

            <form method="POST" id="forgotForm" novalidate>

                <div class="field">
                    <label class="field-label">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <div class="input-wrap">
                        <i class="pfx fas fa-envelope"></i>
                        <input type="email" id="email" name="email"
                               placeholder="you@example.com"
                               autocomplete="email" autocorrect="off" spellcheck="false" required>
                    </div>
                </div>

                <button type="submit" class="btn-signin" id="submitBtn">
                    <i class="fas fa-paper-plane"></i>
                    Send reset code
                </button>

            </form>
        </div>

        <div class="footer">
            <p class="signup-line"><a href="/signin">← Back to Sign In</a></p>
        </div>

    </div>

    <script>
        const form     = document.getElementById('forgotForm');
        const emailEl  = document.getElementById('email');
        const errBox   = document.getElementById('errorMsg');
        const errText  = document.getElementById('errorText');

        function showErr(msg) {
            errText.textContent = msg;
            errBox.classList.add('show');
            errBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        function hideErr() { errBox.classList.remove('show'); }

        {% if error %}showErr("{{ error }}");{% endif %}

        emailEl.addEventListener('input', hideErr);

        form.addEventListener('submit', function(e) {
            hideErr();
            const val = emailEl.value.trim();
            if (!val || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(val)) {
                e.preventDefault();
                showErr('Please enter a valid email address.');
                emailEl.focus();
                return;
            }
            document.getElementById('overlay').classList.add('show');
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<span class="spinner"></span> Sending…';
            btn.disabled = true;
        });
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/static/service-worker.js').catch(()=>{});
        });
      }
    </script>
</body>
</html>
